<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap - Hastane Sistemi</title>
  <link rel="stylesheet" href="../css/stil.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="navbar" id="navbar">
    <h2><a href="../index.html" style="text-decoration:none;color:inherit;">🏥 Hastane Sistemi</a></h2>
    <div class="navbar-links" id="navLinks"></div>
  </div>

  <div class="auth-section">
    <div style="position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.1) 0%,transparent 70%);border-radius:50%;pointer-events:none;"></div>
    <div style="position:absolute;bottom:-100px;left:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(37,99,235,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;"></div>

    <div class="auth-card">
      <div class="logo"></div>
      <h2>Tekrar Hoş Geldiniz</h2>
      <p class="sub">Hesabınıza giriş yapın</p>

      <div class="alert alert-danger" id="alert-danger"></div>
      <div class="alert alert-success" id="alert-success">✅ Giriş başarılı! Yönlendiriliyorsunuz...</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">E-posta Adresi</label>
          <input type="email" id="email" placeholder="ornek@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Şifre</label>
          <div style="position:relative;">
            <input type="password" id="password" placeholder="Şifrenizi girin" required>
            <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted);" id="passToggle">👁️</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--text-muted);cursor:pointer;">
            <input type="checkbox" id="remember" style="width:auto;accent-color:var(--primary);">
            Beni Hatırla
          </label>
          <a href="#" style="font-size:0.88rem;color:var(--primary);font-weight:600;text-decoration:none;">Şifremi Unuttum?</a>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Giriş Yap</button>
      </form>

      <div class="divider">veya</div>
      <button class="btn-social" onclick="googleLogin()"><span>🌐</span> Google ile Giriş Yap</button>
      <div class="auth-footer">Hesabınız yok mu? <a href="kayit.html">Kayıt Olun</a></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    buildNavbar('giris');
    if (AuthAPI.isLoggedIn()) window.location.href = 'randevu.html';

    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 30));

    function togglePass() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('passToggle');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    function googleLogin() { alert('Google girişi henüz aktif değil.'); }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const dangerEl  = document.getElementById('alert-danger');
      const successEl = document.getElementById('alert-success');
      const loginBtn  = document.getElementById('loginBtn');

      dangerEl.style.display  = 'none';
      successEl.style.display = 'none';

      if (!email || !password) {
        dangerEl.textContent   = '⚠️ Lütfen e-posta ve şifrenizi girin!';
        dangerEl.style.display = 'block';
        return;
      }

      loginBtn.disabled    = true;
      loginBtn.textContent = '⏳ Giriş yapılıyor...';

      try {
        await AuthAPI.giris(email, password);
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = 'randevu.html', 1200);
      } catch (error) {
        dangerEl.textContent   = '❌ ' + (error.message || 'E-posta veya şifre hatalı!');
        dangerEl.style.display = 'block';
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
